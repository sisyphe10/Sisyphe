<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sisyphe</title>
    <link href='https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap' rel='stylesheet'>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>document.addEventListener('DOMContentLoaded',function(){if(window.Chart)Chart.defaults.font.family="'Inter','Noto Sans KR',sans-serif";});</script>
    <style>
        :root {
            --bg-color: #111111;
            --card-bg: #1c1c1c;
            --text-color: #ffffff;
            --text-muted: #bbb;
            --accent: #45557f;
            --accent-light: #8ea0c4;
            --income: #ff7a2f;
            --expense: #f2576a;
            --purple: #7f5996;
            --purple-light: #b89fca;
            --navy: #45557f;
            --border: #333;
            --input-bg: #252525;
            --hover-bg: #222;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            line-height: 1.6;
            max-width: 960px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 24px;
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
            position: relative;
        }
        header h1 { font-size: 2.2rem; letter-spacing: 2px; color: #fff; }
        header .sheet-link {
            position: absolute;
            top: 20px;
            right: 0;
            color: #fff;
            font-size: 0.8rem;
            font-weight: 600;
            text-decoration: none;
            background: #0F9D58;
            padding: 5px 14px;
            border-radius: 6px;
            border: none;
            transition: all 0.2s;
        }
        header .sheet-link:hover {
            background: #0B8043;
            color: #fff;
        }

        /* Main Tabs */
        .main-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 24px;
            border-bottom: 2px solid var(--navy);
        }
        .main-tab {
            padding: 10px 32px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            color: var(--text-muted);
            border: 1px solid transparent;
            border-bottom: none;
            border-radius: 8px 8px 0 0;
            background: var(--input-bg);
            transition: all 0.2s;
        }
        .main-tab:hover { color: var(--text-color); }
        .main-tab.active {
            color: var(--accent-light);
            background: var(--card-bg);
            border-color: var(--navy) var(--navy) transparent;
            margin-bottom: -2px;
        }
        .tab-page { display: none; }
        .tab-page.active { display: block; }

        /* Fitness */
        .fitness-summary {
            background: var(--card-bg); border-radius: 12px; padding: 16px 20px;
            margin-bottom: 20px;
            display: flex; gap: 24px; align-items: center; flex-wrap: wrap;
        }
        .fitness-summary h4 { color: var(--purple-light); font-size: 0.95rem; margin: 0; }
        .fitness-summary .stat { display: flex; align-items: baseline; gap: 8px; }
        .fitness-summary .stat-label { color: var(--text-muted); font-size: 0.8rem; white-space: nowrap; }
        .fitness-summary .stat-value { font-size: 1.1rem; font-weight: 700; white-space: nowrap; }
        .fitness-summary .stat-sub { font-size: 0.75rem; color: var(--text-muted); white-space: nowrap; }
        .fitness-calendar table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .fitness-calendar th { background: var(--input-bg); padding: 8px 6px; text-align: center; font-size: 0.75rem; color: var(--text-muted); border-bottom: 1px solid var(--border); }
        .fitness-calendar td { padding: 8px 6px; border-bottom: 1px solid var(--border); vertical-align: top; }
        .fitness-calendar td.day-cell { text-align: center; white-space: nowrap; font-weight: 600; width: 70px; }
        .fitness-calendar td.plan-cell { color: var(--text-muted); font-size: 0.8rem; line-height: 1.5; }
        .fitness-calendar td.actual-cell { font-size: 0.8rem; line-height: 1.5; }
        .fitness-calendar tr.today { background: rgba(69,85,127,0.15); }
        .fitness-calendar tr.past td.actual-cell.empty { color: #555; }
        .plan-run { color: var(--accent-light); }
        .plan-weight { color: var(--income); }
        .plan-tennis { color: #4CAF50; }
        .plan-rest { color: #666; }
        .actual-run { color: var(--accent-light); font-weight: 600; }
        .actual-weight { color: var(--income); font-weight: 600; }
        .actual-tennis { color: #4CAF50; font-weight: 600; }
        .dday { text-align: center; padding: 12px; background: var(--card-bg); border-radius: 12px; margin-bottom: 20px; }
        .dday .count { font-size: 1.3rem; font-weight: 800; color: var(--income); }
        .week-selector {
            display: flex; justify-content: center; align-items: center;
            gap: 16px; margin-bottom: 20px;
        }
        .week-selector button {
            background: var(--input-bg); border: 1px solid var(--border); color: var(--text-color);
            width: 36px; height: 36px; border-radius: 50%; font-size: 1.1rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .week-selector button:hover { background: var(--navy); color: #fff; border-color: var(--navy); }
        .week-label { font-size: 1rem; font-weight: bold; min-width: 200px; text-align: center; }
        @media (max-width: 768px) {
            .fitness-summary { flex-direction: column; gap: 8px; }
        }

        /* Month Selector */
        .month-selector {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }
        .month-selector button {
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text-color);
            width: 36px; height: 36px;
            border-radius: 50%;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .month-selector button:hover { background: var(--navy); color: #fff; border-color: var(--navy); }
        .month-label { font-size: 1.15rem; font-weight: bold; min-width: 120px; text-align: center; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* Summary Cards */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }
        .summary-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 18px 16px;
            border-left: 4px solid var(--navy);
            transition: transform 0.2s;
        }
        .summary-card:hover { transform: translateY(-2px); }
        .summary-card.income { border-left-color: var(--income); }
        .summary-card.expense { border-left-color: var(--expense); }
        .summary-card.net { border-left-color: var(--purple); }
        .summary-card.balance { border-left-color: var(--navy); }
        .summary-card .label { font-size: 0.8rem; color: #fff; margin-bottom: 4px; font-weight: 600; }
        .summary-card .value { font-size: 1.3rem; font-weight: bold; color: #fff; }
        .summary-card .value.positive { color: #fff; }
        .summary-card .value.negative { color: #fff; }

        /* Charts */
        .chart-row {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 16px;
            margin-bottom: 24px;
        }
        .chart-box {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
        }
        .chart-box h3 { font-size: 0.95rem; color: var(--purple-light); margin-bottom: 12px; font-weight: 700; }
        .chart-container { position: relative; height: 280px; }

        /* Tables */
        .category-detail {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease;
        }
        .category-detail h3 { font-size: 0.95rem; color: var(--purple-light); margin-bottom: 12px; font-weight: 700; }

        .table-wrap {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            overflow-x: auto;
        }
        .table-wrap h3 { font-size: 0.95rem; color: var(--purple-light); margin-bottom: 12px; font-weight: 700; }
        table { width: 100%; border-collapse: collapse; }
        th {
            background: var(--input-bg);
            padding: 10px 12px;
            text-align: left;
            font-size: 0.8rem;
            color: var(--purple-light);
            border-bottom: 2px solid var(--border);
            white-space: nowrap;
        }
        td {
            padding: 9px 12px;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
            color: #ddd;
        }
        tr:hover { background: var(--hover-bg); }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: bold;
            color: #fff;
        }
        .badge.income { background: var(--income); }
        .badge.expense { background: var(--expense); }
        .amount-income { color: #fff; font-weight: 600; }
        .amount-expense { color: #fff; font-weight: 600; }

        /* Budget */
        .budget-summary {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .budget-summary h3 { font-size: 1.15rem; color: #fff; margin-bottom: 8px; font-weight: 800; }
        .budget-overall {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .budget-overall .amount { font-size: 1.3rem; font-weight: bold; }
        .budget-overall .pct { font-size: 1.1rem; font-weight: bold; }

        .progress-outer {
            flex: 1;
            background: var(--input-bg);
            border-radius: 6px;
            height: 22px;
            overflow: hidden;
        }
        .progress-inner {
            height: 100%;
            border-radius: 6px;
            transition: width 0.4s ease;
            min-width: 0;
        }
        .progress-green { background: var(--navy); }
        .progress-orange { background: var(--income); }
        .progress-red { background: var(--expense); }

        .budget-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .budget-item {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 16px;
        }
        .budget-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .budget-item-header .cat-name { font-weight: 600; font-size: 0.9rem; }
        .budget-item-stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 6px;
        }

        /* Calendar */
        .calendar-wrap {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .calendar-wrap h3 { font-size: 0.95rem; color: var(--purple-light); margin-bottom: 12px; font-weight: 700; }
        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
        }
        .cal-header {
            text-align: center;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            padding: 6px 0;
        }
        .cal-header.sun { color: var(--expense); }
        .cal-header.sat { color: var(--purple-light); }
        .cal-cell {
            background: var(--input-bg);
            border-radius: 6px;
            padding: 4px 5px;
            min-height: 68px;
            position: relative;
        }
        .cal-cell.empty { background: transparent; }
        .cal-cell.today { border: 1px solid var(--navy); }
        .cal-day {
            font-size: 0.87rem;
            font-weight: 600;
            margin-bottom: 2px;
            color: #ddd;
        }
        .cal-cell.sun .cal-day { color: var(--expense); }
        .cal-cell.sat .cal-day { color: var(--purple-light); }
        .cal-amounts {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }
        .cal-amounts span {
            font-size: 0.72rem;
            line-height: 1.3;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .cal-income { color: rgba(255,122,47,0.75); }
        .cal-expense { color: rgba(242,87,106,0.75); }
        .cal-net { color: var(--text-muted); font-weight: 600; }
        .cal-net.positive { color: var(--income); }
        .cal-net.negative { color: var(--expense); }

        /* Empty state */
        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 40px 20px;
            font-size: 0.9rem;
        }

        /* Loading state */
        .loading-state {
            text-align: center;
            color: var(--text-muted);
            padding: 60px 20px;
            font-size: 0.95rem;
        }

        /* Footer */
        footer {
            text-align: center;
            margin-top: 40px;
            padding: 16px;
            color: #555;
            font-size: 0.8rem;
            border-top: 1px solid #333;
        }

        /* Responsive */
        @media (max-width: 768px) {
            body { padding: 12px; }
            .summary-grid { grid-template-columns: repeat(2, 1fr); }
            .chart-row { grid-template-columns: 1fr; }
            .budget-overall { flex-direction: column; align-items: stretch; }
        }
        @media (max-width: 480px) {
            .summary-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
            .summary-card { padding: 14px 12px; }
            .summary-card .value { font-size: 1.1rem; }
        }
    </style>
</head>

<header>
    <h1>Sisyphe</h1>
    <a class="sheet-link" href="https://docs.google.com/spreadsheets/d/1V41yiwO4VrVUhjhqHyu8JGsuGcqw6pZen0NHdxzXHGs/edit" target="_blank">Sheet</a>
</header>

<div class="main-tabs">
    <div class="main-tab active" onclick="switchMainTab('ledger')">Ledger</div>
    <div class="main-tab" onclick="switchMainTab('fitness')">Fitness</div>
</div>

<div id="page-ledger" class="tab-page active">

<div class="month-selector">
    <button id="prevMonth">&#9664;</button>
    <span class="month-label" id="monthLabel"></span>
    <button id="nextMonth">&#9654;</button>
</div>

<main id="mainContent">
    <div class="loading-state" id="loadingState">데이터를 불러오는 중...</div>

    <div id="dashboardContent" style="display:none;">
        <div class="summary-grid">
            <div class="summary-card income">
                <div class="label">수입</div>
                <div class="value" id="sumIncome">-</div>
            </div>
            <div class="summary-card expense">
                <div class="label">지출</div>
                <div class="value" id="sumExpense">-</div>
            </div>
            <div class="summary-card net">
                <div class="label">순수입</div>
                <div class="value" id="sumNet">-</div>
            </div>
            <div class="summary-card balance">
                <div class="label">총 잔액</div>
                <div class="value" id="sumBalance">-</div>
            </div>
        </div>

        <div class="budget-summary" id="budgetSummarySection" style="display:none;">
            <h3>이번 달 예산 현황</h3>
            <div id="budgetList"></div>
            <div class="budget-overall">
                <div>
                    <span class="amount" id="budgetSpent">-</span>
                    <span style="color:var(--text-muted);"> / </span>
                    <span class="amount" id="budgetTotal">-</span>
                </div>
                <div class="progress-outer"><div class="progress-inner" id="budgetBar"></div></div>
                <div class="pct" id="budgetPct">-</div>
            </div>
        </div>

        <div class="calendar-wrap">
            <h3>월간 달력</h3>
            <div class="cal-grid" id="calendarGrid"></div>
        </div>
        <div class="chart-row">
            <div class="chart-box">
                <h3>월별 수입/지출 추이</h3>
                <div class="chart-container"><canvas id="trendChart"></canvas></div>
            </div>
            <div class="chart-box">
                <h3>카테고리별 지출</h3>
                <div class="chart-container"><canvas id="categoryChart"></canvas></div>
            </div>
        </div>
        <div class="category-detail" id="categoryDetail" style="display:none;">
            <h3 id="categoryDetailTitle">카테고리 상세</h3>
            <div id="categoryDetailBody"></div>
        </div>
        <div class="table-wrap">
            <h3>최근 거래</h3>
            <div id="recentTxBody"></div>
        </div>
    </div>
</main>

</div><!-- /page-ledger -->

<div id="page-fitness" class="tab-page">
    <div class="dday" id="ddayBox"></div>
    <div class="week-selector">
        <button onclick="changeWeek(-1)">&#9664;</button>
        <span class="week-label" id="weekLabel"></span>
        <button onclick="changeWeek(1)">&#9654;</button>
    </div>
    <div class="fitness-summary" id="fitnessSummary"></div>
    <div class="fitness-calendar">
        <table>
            <thead><tr><th style="width:70px">날짜</th><th>계획</th><th>실제</th></tr></thead>
            <tbody id="fitnessBody"></tbody>
        </table>
    </div>
</div>

<footer>Sisyphe &copy; 2026</footer>

<script>
// ============================================================
// MAIN TAB SWITCHING
function switchMainTab(tabId) {
    document.querySelectorAll('.main-tab').forEach(function(t) {
        t.classList.toggle('active', t.textContent.toLowerCase() === tabId);
    });
    document.querySelectorAll('.tab-page').forEach(function(p) {
        p.classList.toggle('active', p.id === 'page-' + tabId);
    });
    if (tabId === 'fitness' && !fitnessLoaded) loadFitnessData();
}

var fitnessWeekIdx = 0;
var fitnessActual = [];
var fitnessLoaded = false;

function addDays(dateStr, n) {
    var d = new Date(dateStr + 'T00:00:00');
    d.setDate(d.getDate() + n);
    return d.toISOString().slice(0,10);
}

function getTodayStr() {
    var now = new Date();
    now.setHours(now.getHours() + 9); // KST
    return now.toISOString().slice(0,10);
}

function loadFitnessData() {
    var url = 'https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values/' +
              encodeURIComponent('운동기록') + '?key=' + GOOGLE_API_KEY;
    fetch(url).then(function(r){return r.json()}).then(function(data) {
        fitnessActual = (data.values || []).slice(1).map(function(r) {
            return { date: r[0]||'', type: r[1]||'', distance: parseFloat(r[2])||0, duration: parseInt(r[3])||0, memo: r[4]||'' };
        });
        fitnessLoaded = true;
        // 현재 주차 자동 선택
        var today = getTodayStr();
        for (var i = 0; i < FITNESS_WEEKS.length; i++) {
            var wEnd = addDays(FITNESS_WEEKS[i].mon, 6);
            if (today >= FITNESS_WEEKS[i].mon && today <= wEnd) { fitnessWeekIdx = i; break; }
        }
        renderFitness();
    }).catch(function() {
        fitnessLoaded = true;
        renderFitness();
    });
}

function changeWeek(dir) {
    fitnessWeekIdx = Math.max(0, Math.min(FITNESS_WEEKS.length - 1, fitnessWeekIdx + dir));
    renderFitness();
}

function renderFitness() {
    var w = FITNESS_WEEKS[fitnessWeekIdx];
    var today = getTodayStr();

    // D-Day
    var dday = Math.ceil((new Date(RACE_DATE) - new Date(today)) / 86400000);
    var ddayBox = document.getElementById('ddayBox');
    if (dday > 0) {
        ddayBox.innerHTML = '🏁 하프마라톤 5/30(토) <span class="count">D-' + dday + '</span>';
    } else if (dday === 0) {
        ddayBox.innerHTML = '🏁 <span class="count">레이스 당일!</span>';
    } else {
        ddayBox.innerHTML = '🏁 레이스 완료';
    }

    // Week label
    document.getElementById('weekLabel').textContent = w.label + ' (목표 ' + w.targetKm + 'km)';

    // Collect actual data for this week
    var wStart = w.mon;
    var wEnd = addDays(w.mon, 6);
    var weekActual = fitnessActual.filter(function(a) { return a.date >= wStart && a.date <= wEnd; });

    // Weekly stats
    var actualKm = 0, actualMin = 0, runCount = 0, weightCount = 0, tennisCount = 0;
    weekActual.forEach(function(a) {
        if (a.type === '런닝') { runCount++; actualKm += a.distance; actualMin += a.duration; }
        else if (a.type === '웨이트') weightCount++;
        else if (a.type === '테니스') tennisCount++;
    });
    var paceStr = '';
    if (actualKm > 0 && actualMin > 0) {
        var p = actualMin / actualKm;
        paceStr = Math.floor(p) + ':' + ('0'+Math.round((p%1)*60)).slice(-2) + '/km';
    }

    // Plan stats
    var planKm = 0, planRun = 0, planWeight = 0, planTennis = 0;
    for (var i = 0; i < 7; i++) {
        var d = addDays(w.mon, i);
        var p = PLAN[d];
        if (p) {
            planKm += p.km || 0;
            if (p.plan) p.plan.forEach(function(s) {
                if (s.indexOf('🏃') >= 0) planRun++;
                if (s.indexOf('🏋') >= 0) planWeight++;
                if (s.indexOf('🎾') >= 0) planTennis++;
            });
        }
    }

    // Summary
    var pct = planKm > 0 ? Math.round(actualKm / planKm * 100) : 0;
    var summaryHtml = '<h4>주간 요약</h4>';
    summaryHtml += '<div class="stat"><div class="stat-label">🏃 러닝</div>';
    summaryHtml += '<div class="stat-value">' + actualKm.toFixed(1) + '/' + planKm + 'km (' + pct + '%)</div>';
    if (paceStr) summaryHtml += '<div class="stat-sub">평균 ' + paceStr + '</div>';
    summaryHtml += '</div>';
    summaryHtml += '<div class="stat"><div class="stat-label">횟수</div>';
    summaryHtml += '<div class="stat-value">🏃' + runCount + '/' + planRun + ' 🏋️' + weightCount + '/' + planWeight + ' 🎾' + tennisCount + '/' + planTennis + '</div></div>';
    summaryHtml += '<div class="stat"><div class="stat-label">시간</div>';
    summaryHtml += '<div class="stat-value">' + actualMin + '분</div></div>';
    document.getElementById('fitnessSummary').innerHTML = summaryHtml;

    // Calendar rows
    var html = '';
    for (var i = 0; i < 7; i++) {
        var d = addDays(w.mon, i);
        var dt = new Date(d + 'T00:00:00');
        var dayName = DAYS_KR[dt.getDay()];
        var isToday = d === today;
        var isPast = d < today;
        var p = PLAN[d];

        // Plan column
        var planHtml = '';
        if (p && p.plan) {
            p.plan.forEach(function(s) {
                var cls = 'plan-rest';
                if (s.indexOf('🏃') >= 0) cls = 'plan-run';
                else if (s.indexOf('🏋') >= 0) cls = 'plan-weight';
                else if (s.indexOf('🎾') >= 0) cls = 'plan-tennis';
                planHtml += '<div class="' + cls + '">' + s + '</div>';
            });
        } else {
            planHtml = '<span class="plan-rest">-</span>';
        }

        // Actual column
        var dayActual = weekActual.filter(function(a) { return a.date === d; });
        var actualHtml = '';
        if (dayActual.length > 0) {
            dayActual.forEach(function(a) {
                if (a.type === '런닝') {
                    var ap = a.duration / a.distance;
                    var apStr = Math.floor(ap) + ':' + ('0'+Math.round((ap%1)*60)).slice(-2);
                    actualHtml += '<div class="actual-run">🏃 ' + a.distance + 'km ' + a.duration + '분 (' + apStr + '/km)';
                    if (a.memo) actualHtml += ' · ' + a.memo;
                    actualHtml += '</div>';
                } else if (a.type === '웨이트') {
                    actualHtml += '<div class="actual-weight">🏋️ ' + a.duration + '분';
                    if (a.memo) actualHtml += ' · ' + a.memo;
                    actualHtml += '</div>';
                } else if (a.type === '테니스') {
                    actualHtml += '<div class="actual-tennis">🎾 ' + a.duration + '분';
                    if (a.memo) actualHtml += ' · ' + a.memo;
                    actualHtml += '</div>';
                }
            });
        } else if (isPast) {
            actualHtml = '<span style="color:#555">-</span>';
        }

        var rowCls = isToday ? ' class="today"' : '';
        var dayColor = dayName === '토' ? 'color:var(--accent-light)' : dayName === '일' ? 'color:var(--expense)' : '';
        html += '<tr' + rowCls + '>';
        html += '<td class="day-cell" style="' + dayColor + '">' + d.slice(5) + '<br>' + dayName + '</td>';
        html += '<td class="plan-cell">' + planHtml + '</td>';
        html += '<td class="actual-cell' + (isPast && dayActual.length === 0 ? ' empty' : '') + '">' + actualHtml + '</td>';
        html += '</tr>';
    }
    document.getElementById('fitnessBody').innerHTML = html;
}

function sheetUrl(name) {
    return `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(name)}?key=${GOOGLE_API_KEY}`;
}

async function loadAllData() {
    try {
        const [txRes, catRes, budgetRes] = await Promise.all([
            fetch(sheetUrl('거래내역')).then(r => r.json()),
            fetch(sheetUrl('카테고리')).then(r => r.json()),
            fetch(sheetUrl('예산')).then(r => r.json())
        ]);

        // Parse transactions (skip header row)
        const txRows = (txRes.values || []).slice(1);
        appData.transactions = txRows.map(r => ({
            date: r[0] || '',
            type: r[1] === '수입' ? 'income' : 'expense',
            category: r[2] || '',
            amount: parseInt((r[3] || '0').replace(/,/g, '')) || 0,
            memo: r[4] || ''
        }));

        // Parse categories
        const catRows = (catRes.values || []).slice(1);
        appData.categories = { expense: [], income: [] };
        catRows.forEach(r => {
            const type = r[0] === '수입' ? 'income' : 'expense';
            if (r[1]) appData.categories[type].push(r[1]);
        });

        // Parse budgets (날짜, 유형, 카테고리, 금액, 메모)
        const budgetRows = (budgetRes.values || []).slice(1);
        appData.budgets = {};
        const BUDGET_EXCLUDE = ['의료'];
        budgetRows.forEach(r => {
            const category = r[2] || '';
            const amount = parseInt((r[3] || '0').replace(/,/g, '')) || 0;
            const group = r[4] || '기타';
            if (!category) return;
            if (BUDGET_EXCLUDE.includes(category)) return;
            if (!appData.budgets[group]) appData.budgets[group] = { total: 0, categories: {} };
            appData.budgets[group].categories[category] = amount;
            appData.budgets[group].total += amount;
        });
    } catch (e) {
        console.error('Sheet load error:', e);
    }
}

function formatWon(amount) {
    if (amount == null || isNaN(amount)) return '-';
    const sign = amount < 0 ? '-' : '';
    return sign + Math.abs(amount).toLocaleString('ko-KR');
}

function formatDate(dateStr) {
    const [, m, d] = dateStr.split('-');
    return `${parseInt(m)}.${parseInt(d)}`;
}

function getMonthLabel(y, m) {
    return `${y}년 ${m}월`;
}

function prevMonth() {
    state.currentMonth--;
    if (state.currentMonth < 1) { state.currentMonth = 12; state.currentYear--; }
}

function nextMonth() {
    state.currentMonth++;
    if (state.currentMonth > 12) { state.currentMonth = 1; state.currentYear++; }
}

function getTodayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}

function sum(arr, field) {
    return arr.reduce((s, item) => s + (Number(item[field]) || 0), 0);
}

function groupBy(arr, key) {
    const map = {};
    arr.forEach(item => {
        const k = item[key];
        if (!map[k]) map[k] = [];
        map[k].push(item);
    });
    return map;
}

function getProgressClass(pct) {
    if (pct > 100) return 'progress-red';
    if (pct >= 80) return 'progress-orange';
    return 'progress-green';
}

function getProgressColor(pct) {
    // 0-70%: navy(#45557f), 70-100%: navy→red 그라데이션, 100%+: red
    if (pct <= 70) return '#45557f';
    if (pct >= 100) return '#f2576a';
    var t = (pct - 70) / 30; // 0~1
    var r = Math.round(69 + (242 - 69) * t);
    var g = Math.round(85 + (87 - 85) * t);
    var b = Math.round(127 + (106 - 127) * t);
    return 'rgb(' + r + ',' + g + ',' + b + ')';
}

    const totalBalance = sum(all.filter(t => t.type === 'income'), 'amount') - sum(all.filter(t => t.type === 'expense'), 'amount');

    elNet.textContent = formatWon(net);

function renderCalendar() {
    const y = state.currentYear;
    const m = state.currentMonth;
    const txs = getTransactions(y, m);

    // Build daily sums
    const dailyData = {};
    txs.forEach(tx => {
        const day = parseInt(tx.date.split('-')[2]);
        if (!dailyData[day]) dailyData[day] = { income: 0, expense: 0 };
        if (tx.type === 'income') dailyData[day].income += tx.amount;
        else dailyData[day].expense += tx.amount;
    });

    const firstDay = new Date(y, m - 1, 1).getDay(); // 0=Sun
    const daysInMonth = new Date(y, m, 0).getDate();
    const today = new Date();
    const isThisMonth = today.getFullYear() === y && today.getMonth() + 1 === m;

    const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
    let html = dayNames.map((d, i) =>
        `<div class="cal-header${i === 0 ? ' sun' : i === 6 ? ' sat' : ''}">${d}</div>`
    ).join('');

    // Empty cells before 1st
    for (let i = 0; i < firstDay; i++) {
        html += '<div class="cal-cell empty"></div>';
    }

    for (let d = 1; d <= daysInMonth; d++) {
        const dow = (firstDay + d - 1) % 7;
        const isToday = isThisMonth && today.getDate() === d;
        const data = dailyData[d];
        let cls = 'cal-cell';
        if (dow === 0) cls += ' sun';
        if (dow === 6) cls += ' sat';
        if (isToday) cls += ' today';

        let amountsHtml = '';
        if (data) {
            const net = data.income - data.expense;
            if (data.income > 0) amountsHtml += `<span class="cal-income">+${shortWon(data.income)}</span>`;
            if (data.expense > 0) amountsHtml += `<span class="cal-expense">-${shortWon(data.expense)}</span>`;
            if (data.income > 0 && data.expense > 0 && Math.abs(net) >= 10000) {
                amountsHtml += '<div style="border-top:1px solid #fff;margin:1px 0;width:fit-content;min-width:2em"></div>';
                const netCls = net >= 0 ? 'positive' : 'negative';
                amountsHtml += `<span class="cal-net ${netCls}">${net >= 0 ? '+' : '-'}${shortWon(net)}</span>`;
            }
        }

        html += `<div class="${cls}">
            <div class="cal-day">${d}</div>
            <div class="cal-amounts">${amountsHtml}</div>
        </div>`;
    }

    document.getElementById('calendarGrid').innerHTML = html;
}

function shortWon(amount) {
    const abs = Math.abs(amount);
    if (abs >= 10000) return Math.round(abs / 10000) + '만';
    if (abs >= 1000) return (abs / 1000).toFixed(0) + '천';
    return abs.toLocaleString();
}

                    grid: { color: '#2a2a2a' }
                }
            }
        }
    });
}

function renderCategoryChart() {
    const txs = getTransactions(state.currentYear, state.currentMonth).filter(t => t.type === 'expense');

    if (txs.length === 0) {
        if (charts.category) { charts.category.destroy(); charts.category = null; }
        return;
    }

    const grouped = groupBy(txs, 'category');
    const labels = Object.keys(grouped);
    const data = labels.map(k => sum(grouped[k], 'amount'));

    if (charts.category) charts.category.destroy();

    charts.category = new Chart(document.getElementById('categoryChart'), {
        type: 'doughnut',
        data: {
            labels,
            datasets: [{
                data,
                backgroundColor: labels.map((_, i) => CATEGORY_COLORS[i % CATEGORY_COLORS.length]),
                borderWidth: 0
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            onClick: (evt, elements) => {
                if (elements.length > 0) {
                    const idx = elements[0].index;
                    const category = labels[idx];
                    showCategoryDetail(category);
                }
            },
            plugins: {
                legend: {
                    position: 'right',
                    labels: { color: '#ffffff', font: { size: 11 }, padding: 8, boxWidth: 12 }
                },
                tooltip: {
                    callbacks: { label: ctx => `${ctx.label}: ${formatWon(ctx.raw)}` }
                }
            }
        }
    });
}

var _activeCategoryDetail = null;

function showCategoryDetail(category) {
    const wrap = document.getElementById('categoryDetail');
    // 같은 카테고리 다시 클릭 시 닫기
    if (_activeCategoryDetail === category) {
        wrap.style.display = 'none';
        _activeCategoryDetail = null;
        return;
    }
    _activeCategoryDetail = category;

    const txs = getTransactions(state.currentYear, state.currentMonth)
        .filter(tx => tx.type === 'expense' && tx.category === category)
        .sort((a, b) => b.date.localeCompare(a.date));

    const monthLabel = `${state.currentYear}년 ${state.currentMonth}월`;
    document.getElementById('categoryDetailTitle').textContent = `${monthLabel} ${category} 내역`;

    const body = document.getElementById('categoryDetailBody');
    if (txs.length === 0) {
        body.innerHTML = '<div class="empty-state">해당 카테고리의 거래 내역이 없습니다</div>';
    } else {
        let total = 0;
        let html = '<table><thead><tr><th>날짜</th><th>금액</th><th>메모</th></tr></thead><tbody>';
        txs.forEach(tx => {
            total += tx.amount;
            html += `<tr>
                <td>${formatDate(tx.date)}</td>
                <td class="amount-expense">-${formatWon(tx.amount)}</td>
                <td style="color:var(--text-muted)">${tx.memo || ''}</td>
            </tr>`;
        });
        html += '</tbody></table>';
        html += `<div style="text-align:right;margin-top:10px;font-weight:700;color:var(--expense);">합계: -${formatWon(total)} (${txs.length}건)</div>`;
        body.innerHTML = html;
    }
    wrap.style.display = 'block';
    wrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function renderRecentTransactions() {
    const txs = getTransactions(state.currentYear, state.currentMonth)
        .sort((a, b) => b.date.localeCompare(a.date))
        .slice(0, 10);

    const container = document.getElementById('recentTxBody');
    if (txs.length === 0) {
        container.innerHTML = '<div class="empty-state">이번 달 거래 내역이 없습니다</div>';
        return;
    }

    let html = '<table><thead><tr><th>날짜</th><th>유형</th><th>카테고리</th><th>금액</th><th>메모</th></tr></thead><tbody>';
    txs.forEach(tx => {
        const cls = tx.type === 'income' ? 'amount-income' : 'amount-expense';
        const sign = tx.type === 'income' ? '+' : '-';
        html += `<tr>
            <td>${formatDate(tx.date)}</td>
            <td><span class="badge ${tx.type}">${tx.type === 'income' ? '수입' : '지출'}</span></td>
            <td>${tx.category}</td>
            <td class="${cls}">${sign}${formatWon(tx.amount)}</td>
            <td style="color:var(--text-muted)">${tx.memo || ''}</td>
        </tr>`;
    });
    html += '</tbody></table>';
    container.innerHTML = html;
}

// ============================================================
// INITIALIZATION
// ============================================================
async function init() {
    // Month selector
    document.getElementById('prevMonth').addEventListener('click', () => {
        prevMonth();
        renderMonthSelector();
        renderDashboard();
    });
    document.getElementById('nextMonth').addEventListener('click', () => {
        nextMonth();
        renderMonthSelector();
        renderDashboard();
    });

    renderMonthSelector();

    // Fetch data from Google Sheets
    await loadAllData();

    // Hide loading, show dashboard
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('dashboardContent').style.display = '';

    renderDashboard();

    // Auto-refresh every 5 minutes
    setInterval(async () => {
        await loadAllData();
        renderDashboard();
    }, 5 * 60 * 1000);
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
